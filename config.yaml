# Kafka 配置
kafka:
  brokers:
    - "193.112.178.230:9092"
  topic: "ad-events"
  group_id: "flink2go-consumer-group"
  consumer_count: 4          # 消费者协程数量
  channel_size: 10000        # 消息通道缓冲大小

# MySQL 配置（元数据缓存，已弃用）
# mysql:
#   dsn: "user:password@tcp(localhost:3306)/ad_db?parseTime=true"
#   refresh_interval: 1m       # 刷新间隔

# Redis 配置（元数据缓存）
redis:
  addr: "193.112.178.230:6379"
  password: "czfredisDB!"
  db: 0
  hash_key: "ad_map"          # Redis Hash 键名
  refresh_cron: "0 */1 * * * *"  # cron 表达式：每分钟执行

# ClickHouse 配置
clickhouse:
  addr: "193.112.178.230:9000"
  database: "default"
  table: "ad_aggregation"
  username: "default"
  password: "ckczf123"

# 聚合器配置
aggregator:
  bucket_count: 64           # 聚合桶数量
  channel_size: 1000         # 每个桶的通道缓冲大小

# 写入器配置
writer:
  worker_count: 8            # 写入协程池大小
  flush_cron: "0 */5 * * * *"   # cron 表达式：每 5 分钟执行 Flush
  batch_size: 10000          # 批量写入大小
